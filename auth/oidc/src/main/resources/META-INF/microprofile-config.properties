# Defaults for the oauth build variant (docs/epics/qits-authentication/features/2026-07-16_build-variant-auth.md). Shipped as
# microprofile-config.properties because Quarkus reads THIS file from dependency jars (ordinal 100,
# below the app's application.properties at 250 and env at 300) — application.properties in a
# library jar would be ignored. Deployment values are env-provided and REQUIRED at startup:
# QUARKUS_OIDC_AUTH_SERVER_URL, QUARKUS_OIDC_CLIENT_ID, QUARKUS_OIDC_CREDENTIALS_SECRET (see the
# deployment guide); in dev mode their absence auto-starts a Keycloak via Dev Services instead.

# The variant contract (see eu.wohlben.qits.security's package-info): reported by /api/auth/me and
# expanded into a build-time property in service, so a variant-less build fails augmentation.
qits.auth.variant=oauth

# hybrid: browsers get the code flow terminated at qits + the encrypted q_session cookie (which is
# what lets the header-less transports — EventSource SSE, WebSockets, the /daemon iframe — ride
# along); requests with an Authorization: Bearer JWT are validated resource-server style instead.
quarkus.oidc.application-type=hybrid
# Non-navigation requests get 499 + WWW-Authenticate: OIDC instead of a 302 they can't follow; the
# SPA's authSessionInterceptor reacts with a full-page reload → fresh code flow. Which requests
# count as non-navigation is decided by NonNavigationRequestChecker (marked XHRs, SSE, WebSocket
# upgrades, any Sec-Fetch-Mode other than navigate) — only real navigations enter the code flow,
# so background transports can't clobber the q_auth state cookie mid-login.
quarkus.oidc.authentication.java-script-auto-redirect=false
# Silently refresh an expired access token with the session's refresh token, and let the cookie
# outlive the ID token long enough for that refresh to have something to ride on.
quarkus.oidc.token.refresh-expired=true
quarkus.oidc.authentication.session-age-extension=30M
# Keycloak puts realm_access in the ACCESS token; code-flow roles default to the ID token. (The
# realm_access/roles claim path itself is a built-in fallback — no role-claim-path needed.)
quarkus.oidc.roles.source=accesstoken
# Human-readable identity for /api/auth/me.
quarkus.oidc.token.principal-claim=preferred_username
# RP-initiated logout. Under /api so Quinoa's ignored-path-prefixes already excludes it from the SPA
# fallback; no controller — the OIDC mechanism intercepts this path itself.
quarkus.oidc.logout.path=/api/auth/logout
quarkus.oidc.logout.post-logout-path=/
# Keep the exported OpenAPI document (docs/openapi.yml → the generated Angular client) free of the
# security scheme quarkus-smallrye-openapi would auto-add given quarkus-oidc's presence — the export
# must be variant-independent.
quarkus.smallrye-openapi.auto-add-security=false
