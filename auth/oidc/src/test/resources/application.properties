# Mirror the service app's JAX-RS root so the policy's /api-prefixed public list lines up.
quarkus.rest.path=/api

# The WireMock OIDC stub (OidcWiremockTestResource) sets keycloak.url at runtime; the placeholder
# default keeps augmentation happy before the resource starts.
quarkus.oidc.auth-server-url=${keycloak.url:replaced-by-test-resource}/realms/quarkus
quarkus.oidc.client-id=quarkus-app
quarkus.oidc.credentials.secret=secret
