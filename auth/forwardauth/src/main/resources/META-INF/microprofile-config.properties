# Defaults for the forwardauth build variant (docs/epics/qits-authentication/features/2026-07-16_build-variant-auth.md).
# Shipped as microprofile-config.properties because Quarkus reads THIS file from dependency jars
# (ordinal 100, below the app's application.properties at 250 and env at 300).

# The variant contract (see eu.wohlben.qits.security's package-info): reported by /api/auth/me and
# expanded into a build-time property in service, so a variant-less build fails augmentation.
qits.auth.variant=forwardauth

# Authelia-style header names. oauth2-proxy deployments override via env:
# QITS_AUTH_FORWARD_USER_HEADER=X-Auth-Request-User, QITS_AUTH_FORWARD_GROUPS_HEADER=
# X-Auth-Request-Groups. The proxy MUST inject these AND strip client-supplied copies.
qits.auth.forward.user-header=Remote-User
qits.auth.forward.groups-header=Remote-Groups

# The everyday dev/test identity when no proxy injects the header — this is what makes forwardauth
# the friction-free variant for `quarkus:dev` and the test suites. LaunchMode-guarded in
# ForwardAuthMechanism: a prod (NORMAL) build ignores it even if set.
%dev.qits.auth.forward.dev-user=dev
%test.qits.auth.forward.dev-user=dev
