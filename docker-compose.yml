services:
  postgres:
    image: postgres:16-alpine
    container_name: qits-postgres
    environment:
      POSTGRES_DB: qits
      POSTGRES_USER: qits
      POSTGRES_PASSWORD: qits
    ports:
      - "5432:5432"
    volumes:
      - qits-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qits -d qits"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  qits-postgres-data:
