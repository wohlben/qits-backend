# Continuous deployment: on every push to main, build + test qits, then build and push the two
# container images to GHCR. The SERVER deploys itself — Watchtower there polls GHCR and restarts the
# qits container when a new image lands (see docker-compose.prod.yml). So this workflow has no deploy
# step and needs no server credentials; GITHUB_TOKEN alone pushes to GHCR.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  # GHCR image names. Lowercased org/repo; the workspace image is a sibling package.
  APP_IMAGE: ghcr.io/wohlben/qits
  WORKSPACE_IMAGE: ghcr.io/wohlben/qits-workspace

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Recurse: the fixture submodules (and the nested webui submodule) are needed for the build's
      # fixture-derivation step and the unit tests. Public repos, so the default token suffices.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      # Node + pnpm for the Quinoa Angular build (Quinoa shells the detected pnpm on PATH).
      - name: Set up Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable && corepack prepare pnpm@latest --activate

      # Full reactor build with unit tests (extended/native ITs self-skip without docker). Produces
      # service/target/quarkus-app/ that the app image COPYies. The dev-port guard is irrelevant in
      # CI but harmless; QUARKUS_ANALYTICS_DISABLED keeps the build non-interactive.
      - name: Build & test
        env:
          QUARKUS_ANALYTICS_DISABLED: "true"
        run: ./mvnw -B -ntp package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The workspace image: the toolchain every workspace container runs, AND the base FROM of the
      # app image below (tagged locally as qits/workspace:latest so `FROM qits/workspace:latest`
      # resolves). Pushed so the server can pull it for creating workspace containers.
      - name: Build & push workspace image
        run: |
          docker build -t "$WORKSPACE_IMAGE:latest" -t "$WORKSPACE_IMAGE:${{ github.sha }}" \
            -t qits/workspace:latest docker/workspace
          docker push "$WORKSPACE_IMAGE:latest"
          docker push "$WORKSPACE_IMAGE:${{ github.sha }}"

      # The app image (docker/qits/Dockerfile), built from the repo root so it can COPY
      # service/target/quarkus-app/. Watchtower on the server watches :latest.
      - name: Build & push app image
        run: |
          docker build -t "$APP_IMAGE:latest" -t "$APP_IMAGE:${{ github.sha }}" \
            -f docker/qits/Dockerfile .
          docker push "$APP_IMAGE:latest"
          docker push "$APP_IMAGE:${{ github.sha }}"
