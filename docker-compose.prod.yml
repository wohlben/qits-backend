# Production stack for qits on a single Linux server with Docker. The counterpart to
# .devcontainer/docker-compose.yml: one service (qits itself) on the shared qits-net, plus the
# workspace containers qits creates as siblings via the mounted docker socket — all reachable by DNS
# name. The difference from the devcontainer is that this runs the PACKAGED image (docker/qits/
# Dockerfile) instead of `quarkus:dev`: no source bind-mount, no :4200 Quinoa dev server (Quarkus
# serves the baked Angular SPA on :8080), and the app is fronted by your forward-auth reverse proxy
# rather than published to a host port.
#
# LOCAL-BUILD model (no registry, no Watchtower): the images are BUILT ON THE SERVER from a checkout —
# install.sh does this inside a throwaway container with the docker socket mounted, so the only things
# left on the host are the two built images + this running stack. There is no pull and no auto-update;
# to upgrade, re-run install.sh (it rebuilds :latest and recreates the container).
#
# Prerequisites on the server (all handled by install.sh; here for the by-hand path):
#   - the workspace image built locally:  docker build -t qits/workspace:latest docker/workspace
#   - the app image built locally:        docker build -t qits/app:latest -f docker/qits/Dockerfile .
#   - .env next to this file with DOCKER_GID = the host socket's gid:  stat -c %g /var/run/docker.sock
#   - the qits-net network + qits_shared_* volumes present (install.sh's ensure step creates them if
#     absent; they're declared `external` here so compose attaches rather than trying to own them —
#     qits itself also creates them at startup). By hand: `docker network create qits-net` + three
#     `docker volume create qits_shared_{dot_claude,m2,pnpm}` (all no-ops if they already exist).
#
# Deploy / upgrade:   docker compose -f docker-compose.prod.yml up -d   (after building the images)
name: qits

services:
  qits:
    # The locally-built app image (install.sh / the by-hand `docker build` above produce this tag).
    # pull_policy: never — it is never in a registry; fail loudly if the local build is missing rather
    # than reaching out to Docker Hub for a nonexistent `qits/app`. The `build` block lets
    # `docker compose up -d --build` (re)build it in place from the repo root instead.
    image: ${QITS_IMAGE:-qits/app:latest}
    pull_policy: never
    build:
      context: .
      dockerfile: docker/qits/Dockerfile
    restart: unless-stopped
    # docker-outside-of-docker: qits shells `docker` against the HOST daemon to run sibling
    # workspaces. Grant the qits user access to the mounted socket by its host gid (set in .env;
    # `stat -c %g /var/run/docker.sock`), without baking a machine-specific gid into the image.
    group_add:
      - "${DOCKER_GID:?set DOCKER_GID in .env to the gid of /var/run/docker.sock}"
    volumes:
      # The HOST docker daemon socket — how qits creates/execs/removes workspace containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # qits' application state: the H2 datastore + cloned bare origins. THE thing to back up.
      - qits-data:/home/qits/.qits
      # Shared coding-agent (Claude Code) login — the SAME volume qits mounts into every workspace
      # container at /claude-home (qits.workspace.claude-volume). One OAuth login is shared across all.
      - qits_shared_dot_claude:/claude-home
      # Shared Maven + pnpm caches — the SAME named volumes qits mounts into every workspace container,
      # so a dependency downloaded by one build is reused by all.
      - qits_shared_m2:/caches/m2
      - qits_shared_pnpm:/caches/pnpm
    environment:
      # On qits-net a container reaches qits by this alias — pin it so container->qits (git clone/push,
      # OTLP, MCP) is plain DNS. Matches the `qits` alias below. Maps to qits.workspace.git-host.
      QITS_WORKSPACE_GIT_HOST: qits
      # The image every workspace container runs — built locally (docker build docker/workspace). It is
      # NOT pulled from a registry; qits uses whatever `qits/workspace:latest` is present on the host
      # daemon. After a workspace-image change, rebuild it (install.sh does). Maps to qits.workspace.image.
      QITS_WORKSPACE_IMAGE: qits/workspace:latest
      # First-deploy default: skip the ~700 MB speech model download at boot (fast, offline-safe
      # startup). Flip to true once you want server-side transcription live. Maps to
      # qits.speech.warmup-on-start.
      QITS_SPEECH_WARMUP_ON_START: "false"
      # Attribute the commits qits manufactures to a real bot identity in prod.
      QITS_GIT_AUTHOR_NAME: qits-bot
      QITS_GIT_AUTHOR_EMAIL: qits-bot@example.com
      # Pin the wall-clock zone (also propagated to every workspace container). Set to your server's.
      TZ: ${TZ:-Etc/UTC}
    # NO host-port publish: your forward-auth proxy fronts qits. Put the proxy on qits-net (or attach
    # qits to the proxy's network too) and route it to http://qits:8080. Uncomment ONLY for local
    # debugging on the server — never expose 8080 unauthenticated to the internet (it grants git
    # push, MCP, and effectively the host docker daemon).
    # ports:
    #   - "127.0.0.1:8080:8080"
    healthcheck:
      # SmallRye Health readiness (quarkus-smallrye-health). curl is present in the workspace base.
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/q/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      qits-net:
        aliases:
          - qits

networks:
  # EXTERNAL by design. qits-net is a plain `docker network create` (unlabelled), created by whichever
  # of three things gets there first: install.sh's ensure step, qits' own startup (ensureNetwork), or
  # the DockerExecutor when it attaches a workspace container. If compose tried to OWN it (non-external
  # + pinned name) it would refuse an already-existing unlabelled net as "not created by compose". So
  # compose just ATTACHES to it here; install.sh guarantees it exists first (`docker network create`).
  qits-net:
    external: true

volumes:
  # Application state (H2 + repositories). Compose-managed (project-prefixed) — qits never pre-creates
  # it, so there's no collision. Persists across redeploys — back this up.
  qits-data:
  # Shared with the workspace containers, mounted by these literal names. EXTERNAL for the same reason
  # as qits-net: qits' startup (ensureVolume) / the DockerExecutor create them as plain volumes, so
  # compose must not try to own them. install.sh ensures they exist (`docker volume create`) first.
  qits_shared_dot_claude:
    external: true
  qits_shared_m2:
    external: true
  qits_shared_pnpm:
    external: true
