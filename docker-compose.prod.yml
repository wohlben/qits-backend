# Production stack for qits on a single Linux server with Docker. The counterpart to
# .devcontainer/docker-compose.yml: one service (qits itself) on the shared qits-net, plus the
# workspace containers qits creates as siblings via the mounted docker socket — all reachable by DNS
# name. The difference from the devcontainer is that this runs the PACKAGED image (docker/qits/
# Dockerfile) instead of `quarkus:dev`: no source bind-mount, no :4200 Quinoa dev server (Quarkus
# serves the baked Angular SPA on :8080), and the app is fronted by your forward-auth reverse proxy
# rather than published to a host port.
#
# LOCAL-BUILD model (no registry, no Watchtower): the images are BUILT ON THE SERVER from a checkout —
# install.sh does this inside a throwaway container with the docker socket mounted, so the only things
# left on the host are the two built images + this running stack. There is no pull and no auto-update;
# to upgrade, re-run install.sh (it rebuilds :latest and recreates the container).
#
# Prerequisites on the server (all handled by install.sh; here for the by-hand path). Both images
# are stages of the single docker/qits/Dockerfile:
#   - the workspace image (runtime toolchain for workspace containers) built locally:
#       docker build -t qits/workspace:latest --target workspace -f docker/qits/Dockerfile .
#   - the app image built locally, naming the auth build variant (forwardauth | oauth — baked in at
#     build time, no runtime toggle; docs/epics/qits-authentication/features/2026-07-16_build-variant-auth.md):
#       docker build -t qits/app:latest --build-arg QITS_VARIANT=forwardauth -f docker/qits/Dockerfile .
#   - .env next to this file with DOCKER_GID = the host socket's gid:  stat -c %g /var/run/docker.sock
#   - the qits-net network + qits_shared_* volumes present (install.sh's ensure step creates them if
#     absent; they're declared `external` here so compose attaches rather than trying to own them —
#     qits itself also creates them at startup). By hand: `docker network create qits-net` + three
#     `docker volume create qits_shared_{dot_claude,m2,pnpm}` (all no-ops if they already exist).
#
# Deploy / upgrade:   docker compose -f docker-compose.prod.yml up -d   (after building the images)
name: qits

services:
  qits:
    # The locally-built app image (install.sh / the by-hand `docker build` above produce this tag).
    # pull_policy: never — it is never in a registry; fail loudly if the local build is missing rather
    # than reaching out to Docker Hub for a nonexistent `qits/app`. The `build` block lets
    # `docker compose up -d --build` (re)build it in place from the repo root instead.
    image: ${QITS_IMAGE:-qits/app:latest}
    pull_policy: never
    build:
      context: .
      dockerfile: docker/qits/Dockerfile
      args:
        # Required for `docker compose up -d --build`: the auth build variant (forwardauth | oauth).
        # No default — an unset value fails the in-build enforcer check with the message listing the
        # valid variants. install.sh passes it to `docker build` directly.
        QITS_VARIANT: ${QITS_VARIANT:-}
    restart: unless-stopped
    # docker-outside-of-docker: qits shells `docker` against the HOST daemon to run sibling
    # workspaces. Grant the qits user access to the mounted socket by its host gid (set in .env;
    # `stat -c %g /var/run/docker.sock`), without baking a machine-specific gid into the image.
    group_add:
      - "${DOCKER_GID:?set DOCKER_GID in .env to the gid of /var/run/docker.sock}"
    # Deployment-specific auth env lands here (written by install.sh from the vars you pass into the
    # installer with `docker run -e`, or hand-edited in a persistent checkout). env_file semantics:
    # keys absent from .env are truly UNSET in the container, so the image defaults apply — unlike an
    # `environment:` interpolation, which would inject empty strings. DOCKER_GID/TZ riding along is
    # harmless (TZ is even wanted).
    env_file: .env
    volumes:
      # The HOST docker daemon socket — how qits creates/execs/removes workspace containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # qits' application state: the H2 datastore + cloned bare origins. THE thing to back up.
      - qits-data:/home/qits/.qits
      # Shared coding-agent (Claude Code) login — the SAME volume qits mounts into every workspace
      # container at /claude-home (qits.workspace.claude-volume). One OAuth login is shared across all.
      - qits_shared_dot_claude:/claude-home
      # Shared Maven + pnpm caches — the SAME named volumes qits mounts into every workspace container,
      # so a dependency downloaded by one build is reused by all.
      - qits_shared_m2:/caches/m2
      - qits_shared_pnpm:/caches/pnpm
    environment:
      # Pin the docker CLI's config dir to the qits user's own. Dokploy injects
      # DOCKER_CONFIG=/root/.docker into the .env it writes (its internal registry-auth setting),
      # env_file forwards it into this container, and every docker CLI call then warns
      # "Error loading config file: /root/.docker/config.json: permission denied" — the warning
      # leaks into terminal PTYs and captured output
      # (docs/issues/2026-07-17_docker-cli-stderr-pollutes-captured-output.md). `environment:`
      # beats env_file, so this holds whatever Dokploy writes. The dir need not exist; a missing
      # config is silently skipped.
      DOCKER_CONFIG: /home/qits/.docker
      # On the workspace network a container reaches qits by this alias — pin it so container->qits
      # (git clone/push, OTLP, MCP) is plain DNS. Interpolated from .env with the same default as the
      # network alias below so the two can never drift; maps to qits.workspace.git-host. MUST be
      # unique per stack when a server runs several (see "Running more than one stack" in
      # docs/guides/deployment.md): the network is external and shared, so two stacks answering the
      # same alias round-robin each other's container->qits traffic (git 404s, cross-stack OTLP/MCP).
      QITS_WORKSPACE_GIT_HOST: ${QITS_WORKSPACE_GIT_HOST:-qits}
      # The docker network qits creates workspace containers on (qits.workspace.network). Same value
      # compose resolves for the external network below — one .env setting drives both. Per-stack
      # unique on multi-stack servers, for the same reason as the alias.
      QITS_WORKSPACE_NETWORK: ${QITS_WORKSPACE_NETWORK:-qits-net}
      # The image every workspace container runs — built locally (docker build docker/workspace). It is
      # NOT pulled from a registry; qits uses whatever `qits/workspace:latest` is present on the host
      # daemon. After a workspace-image change, rebuild it (install.sh does). Maps to qits.workspace.image.
      QITS_WORKSPACE_IMAGE: qits/workspace:latest
      # First-deploy default: skip the ~700 MB speech model download at boot (fast, offline-safe
      # startup). Flip to true once you want server-side transcription live. Maps to
      # qits.speech.warmup-on-start.
      QITS_SPEECH_WARMUP_ON_START: "false"
      # Attribute the commits qits manufactures to a real bot identity in prod.
      QITS_GIT_AUTHOR_NAME: qits-bot
      QITS_GIT_AUTHOR_EMAIL: qits-bot@example.com
      # Pin the wall-clock zone (also propagated to every workspace container). Set to your server's.
      TZ: ${TZ:-Etc/UTC}
      # --- Auth is decided by the image's BUILD variant (docs/epics/qits-authentication/features/2026-07-16_build-variant-auth.md);
      # the variant is parameterized via .env (env_file above) — pass the vars into the installer
      # with `docker run -e` (the one-liner flow keeps no checkout to edit) or put them in .env by
      # hand in a persistent checkout. The recognized keys, all optional unless marked:
      #
      # Both variants:
      #   QITS_AUTH_REQUIRED_ROLE=qits-user   # require this role/group on every protected request
      #
      # forwardauth variant — qits trusts the identity headers the forward-auth proxy injects (and
      # 401s every UI/API request that lacks them — the proxy MUST inject them and strip
      # client-supplied copies). Defaults are Authelia's; override for e.g. oauth2-proxy:
      #   QITS_AUTH_FORWARD_USER_HEADER=X-Auth-Request-User
      #   QITS_AUTH_FORWARD_GROUPS_HEADER=X-Auth-Request-Groups
      #
      # oauth variant — qits runs the OIDC login itself (Keycloak); a plain reverse proxy (TLS only,
      # no forward-auth) routes to http://qits:8080. REQUIRED — the container fails startup without
      # them (intended: an oauth image can never run unauthenticated; install.sh checks upfront):
      #   QUARKUS_OIDC_AUTH_SERVER_URL=https://keycloak.example.com/realms/myrealm
      #   QUARKUS_OIDC_CLIENT_ID=qits
      #   QUARKUS_OIDC_CREDENTIALS_SECRET=<client secret>
      # Behind the TLS-terminating reverse proxy, let qits build correct https redirect URIs:
      #   QUARKUS_HTTP_PROXY_PROXY_ADDRESS_FORWARDING=true
      #   QUARKUS_HTTP_PROXY_ENABLE_FORWARDED_HOST=true
    # NO host-port publish: your proxy fronts qits — forward-auth for the forwardauth variant, plain
    # TLS reverse proxy for the oauth variant. Put the proxy on qits-net (or attach qits to the
    # proxy's network too) and route it to http://qits:8080. Uncomment ONLY for local debugging on
    # the server — never expose 8080 directly (a forwardauth qits would trust ANY client-supplied
    # identity header; an exposed qits grants git push, MCP, and effectively the host docker daemon).
    # ports:
    #   - "127.0.0.1:8080:8080"
    healthcheck:
      # SmallRye Health readiness (quarkus-smallrye-health). curl is present in the workspace base.
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/q/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      qits-net:
        aliases:
          # The DNS name workspace containers reach qits by — same .env value (and default) as
          # QITS_WORKSPACE_GIT_HOST above. Per-stack unique on multi-stack servers.
          - ${QITS_WORKSPACE_GIT_HOST:-qits}

networks:
  # EXTERNAL by design. The workspace network is a plain `docker network create` (unlabelled),
  # created by whichever of three things gets there first: install.sh's ensure step, qits' own
  # startup (ensureNetwork), or the DockerExecutor when it attaches a workspace container. If
  # compose tried to OWN it (non-external + pinned name) it would refuse an already-existing
  # unlabelled net as "not created by compose". So compose just ATTACHES to it here; install.sh
  # guarantees it exists first (`docker network create`). The compose-file key stays `qits-net`;
  # `name:` resolves the ACTUAL network per stack from the same .env value the app reads as
  # qits.workspace.network — a second stack sets QITS_WORKSPACE_NETWORK (+ its own
  # QITS_WORKSPACE_GIT_HOST) and creates that network once.
  qits-net:
    external: true
    name: ${QITS_WORKSPACE_NETWORK:-qits-net}

volumes:
  # Application state (H2 + repositories). Compose-managed (project-prefixed) — qits never pre-creates
  # it, so there's no collision. Persists across redeploys — back this up.
  qits-data:
  # Shared with the workspace containers, mounted by these literal names. EXTERNAL for the same reason
  # as qits-net: qits' startup (ensureVolume) / the DockerExecutor create them as plain volumes, so
  # compose must not try to own them. install.sh ensures they exist (`docker volume create`) first.
  qits_shared_dot_claude:
    external: true
  qits_shared_m2:
    external: true
  qits_shared_pnpm:
    external: true
