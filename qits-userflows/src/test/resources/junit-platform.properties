# Order story classes so every @UserflowPrecondition / @UserflowRunsAfter runs before its dependents
# (topological sort; see UserflowClassOrderer). The framework's own harness self-tests exercise the
# dependency/skip/runs-after machinery, so they need this too. Single sequential test JVM (surefire
# default reuseForks=true / forkCount=1); do not enable parallel execution.
junit.jupiter.testclass.order.default=eu.wohlben.qits.userflows.UserflowClassOrderer
