# Builds + tags the qits/workspace toolchain image from source — the base of the app image AND the
# image every workspace container runs. As its own tiny compose stack (rather than a service inside
# docker-compose.dokploy.yml) because compose/bake builds all of one stack's images in PARALLEL and
# offers no portable build ordering — the app build's `FROM qits/workspace:latest` needs this tag to
# already sit in the host's local image store. (compose's additional_contexts/service: dependent-
# images feature would express exactly that, but Dokploy's build pipeline silently ignores it, so we
# don't rely on it.)
#
# Dokploy: deploy this as its own Compose service FIRST, and redeploy it whenever docker/workspace/
# changes (rare, toolchain-only) — see the README's "Deploying with Dokploy" section. The service is
# a build vehicle, not a runtime service: it exits immediately by design (shows as stopped).
# install.sh does NOT use this file — it builds the same image with a plain `docker build`.
services:
  workspace-image:
    image: qits/workspace:latest
    pull_policy: never
    build:
      context: docker/workspace
    command: ["true"]
    restart: "no"
