# Domain tests run against in-memory H2, so the suite needs no Docker/Testcontainers.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:qits;DB_CLOSE_DELAY=-1
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=true

# Daemons don't auto-start with their container during tests — existing tests drive the supervisor
# explicitly and expect precise control. DaemonAutoStarterTest re-enables it via a @TestProfile.
qits.daemons.autostart-enabled=false
