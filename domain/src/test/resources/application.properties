# Domain tests run against in-memory H2, so the suite needs no Docker/Testcontainers.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:qits;DB_CLOSE_DELAY=-1
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=true

# Daemon↔container lifecycle coupling is off during tests — existing tests drive the supervisor
# explicitly and expect precise control. The coupler tests re-enable each direction via a
# @TestProfile.
qits.daemons.autostart-enabled=false
qits.daemons.autostop-enabled=false

# The transcript-tail tests drive polls synchronously (pollNow); park the schedule out of the way.
qits.agent.transcript-tail-poll-ms=3600000
