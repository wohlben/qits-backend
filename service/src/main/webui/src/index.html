<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>QitsUi</title>
  <base href="/">
  <script>
    // Under a supervising qits' daemon web view the app is served at /daemon/{ws}/{daemonId}/
    // (ng serve --serve-path "$QITS_PUBLIC_BASE"). The dev server has no --base-href, so rebase
    // at runtime: with the prefix in <base href>, the Angular router and every base-relative
    // URL (API client, SSE, websockets, api/config.json) stay inside the prefix.
    (function () {
      var match = location.pathname.match(/^\/daemon\/[^/]+\/[^/]+\//);
      if (match) document.querySelector('base').setAttribute('href', match[0]);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

    <script>
      (function () {
        const html = document.documentElement;

        try {
          const theme = localStorage.theme;
          const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches ?? false;

          const isSystem = theme === 'system' || !('theme' in localStorage);
          const isDark = theme === 'dark' || (isSystem && prefersDark);
          html.classList.add('scheme-light-dark');
          html.classList.toggle('dark', isDark);
          html.setAttribute('data-theme', theme ?? 'system');
        } catch (_) {}
      })();
    </script>

  </head>
<body>
  <qits-root></qits-root>
</body>
</html>
