quarkus.rest.path=/api

# H2 everywhere (dev and the packaged app). The file-based DB persists under the
# gitignored service/data/ dir; no Docker/Postgres required. Tests override this with
# an in-memory H2 (see src/test/resources/application.properties).
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/h2/qits;AUTO_SERVER=TRUE
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

quarkus.quinoa.dev-server.port=4200
quarkus.quinoa.enable-spa-routing=true
quarkus.quinoa.ignored-path-prefixes=/api
