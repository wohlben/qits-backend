quarkus.rest.path=/api

# H2 everywhere (dev and the packaged app); no Docker/Postgres required. The file lives at a
# fixed, CWD-independent location under the home dir so the `cli` module (e.g. its `seed` command)
# and this service share the same DB; H2 AUTO_SERVER lets both run at once. Tests override this
# with an in-memory H2 (see src/test/resources/application.properties).
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:${user.home}/.qits/data/h2/qits;AUTO_SERVER=TRUE
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
qits.repositories.data-dir=${user.home}/.qits/data/repositories

# Server-side speech-to-text (NVIDIA Parakeet via onnx-asr in a self-managed venv). The venv and
# runner script live under speech.home; warmup-on-start pre-downloads the ~700 MB model in the
# background at boot so the first transcription doesn't pay for it. Only the service warms up —
# the cli (seed, generate-migration) never transcribes.
qits.speech.home=${user.home}/.qits/speech
qits.speech.warmup-on-start=true

# The domain beans (services, mappers) live in a dependency jar — index it so Arc discovers them.
quarkus.index-dependency.domain.group-id=eu.wohlben
quarkus.index-dependency.domain.artifact-id=domain

# Workspace containers: every workspace executes inside a per-workspace Docker container that sees
# only a clone of the repository (pulled from the /git server above) — never the host home dir or
# its credentials. `image` is the fat default (git + node/pnpm + JDK + python; build it locally,
# `docker build -t qits/workspace docker/workspace`). `git-host`/`qits-port` is how a container
# reaches this qits instance for clone/push. `git-host=auto` detects per environment
# (host.docker.internal on plain Linux docker — wired via --add-host=host.docker.internal:host-gateway
# — or the WSL2 distro's eth0 IP, since host.docker.internal isn't container-reachable there); see
# GitHostResolver. Set an explicit IP/hostname only if auto picks the wrong interface. `term-grace-ms`
# is how long a graceful stop waits before escalating to SIGKILL then a container restart.
qits.workspace.image=qits/workspace:latest
qits.workspace.container-runtime=docker
qits.workspace.git-host=auto
qits.workspace.qits-port=8080
qits.workspace.term-grace-ms=5000
# Periodic checkpoint push: every interval, each running workspace container's branch is pushed to
# origin (best-effort, skipped when already level), bounding what an unexpected container death can
# lose to one interval of committed work. 0 disables. The cli and tests leave it off (code default 0).
qits.workspace.checkpoint-interval-ms=300000
# The coding agent (Claude Code) runs inside the workspace container and authenticates from a shared
# named volume holding its ~/.claude (a one-time OAuth login — run docker/workspace/agent-login.sh
# once). qits creates `claude-volume` at startup and mounts it at `claude-mount` on every workspace
# container; agent launches set HOME=claude-mount so claude reads those creds. TRADE-OFF: because the
# volume is mounted on every container, any command in a container can read the token — accepted for
# the shared-login model (see docs/features/2026-07-04_container-agent-sessions.md). Blank the volume
# name to disable (agent auth then unavailable).
qits.workspace.claude-volume=qits_shared_dot_claude
qits.workspace.claude-mount=/claude-home

# In-memory telemetry buffer (the in-process OTLP receiver at /api/otel/v1/*; see
# docs/features/2026-07-04_observability.md). Ephemeral by design: bounded per-workspace deques
# plus a global byte ceiling that evicts oldest-first from the fattest bucket. Tuning knobs
# default in code (pattern of qits.daemons.*): qits.telemetry.max-spans-per-workspace (5000),
# .max-logs-per-workspace (10000), .max-metric-series-per-workspace (500), .max-total-bytes (64 MiB).

# Workspace live-update SSE (docs/features/2026-07-07_workspace-sse-live-updates.md): per-(workspace,
# topic) debounce window for change hints, leading-edge + trailing. Caps a busy workspace to ≤1
# refetch/s/topic (the SPA flushes OTLP every 1s); an idle workspace produces zero traffic. Code
# default 1000ms.
qits.events.debounce-ms=1000

quarkus.quinoa.dev-server.port=4200
quarkus.quinoa.enable-spa-routing=true
# /api is the REST app; /mcp is the MCP server tree (one named server per context, e.g.
# /mcp/repository); /git is the in-process JGit smart-HTTP server workspace containers clone/push
# from (see QitsGitServlet); /daemon is the daemon web-view reverse proxy (DaemonProxyRoute). All
# must be excluded from Quinoa's SPA fallback so they aren't served the Angular index.html.
quarkus.quinoa.ignored-path-prefixes=/api,/mcp,/git,/daemon

# MCP: the repository-context server. Tools annotated @McpServer("repository") mount here; nothing
# else is exposed on it, so a client scoped to this endpoint only sees repository tools. Each
# connection scopes itself to a single project via the X-QITS-Project header (see ProjectScope).
quarkus.mcp.server.repository.http.root-path=/mcp/repository

# MCP: the actions server. Tools annotated @McpServer("actions") mount here — CRUD over the global
# ActionConfiguration library (a process, e.g. a shell or `mvn test`, that workspaces can run). It is
# unscoped: actions are shared across all projects, so no scope header is required.
quarkus.mcp.server.actions.http.root-path=/mcp/actions
