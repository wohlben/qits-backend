# Dev mode runs against a file-based H2 so `quarkus:dev` needs no Docker/Postgres
# and data persists across restarts. The DB file lives under the gitignored
# service/data/ dir. Production still uses Postgres (see application.properties).
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/h2/qits;AUTO_SERVER=TRUE
