# Tests run against in-memory H2 so the suite needs no Docker/Testcontainers.
# Dev and the packaged app use a file-based H2 (see application.properties).
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:qits;DB_CLOSE_DELAY=-1

quarkus.flyway.clean-at-start=true

# No periodic checkpoint-push sweeps during tests (the main config enables them).
qits.workspace.checkpoint-interval-ms=0

# Daemon↔container lifecycle coupling is off during tests — tests drive the supervisor explicitly.
qits.daemons.autostart-enabled=false
qits.daemons.autostop-enabled=false

# The per-workspace file watcher is off during tests so no inotifywait process is spawned per
# container-started event (its coupling is covered by WorkspaceWatchServiceTest in the domain module).
qits.workspace.watch.enabled=false

# Speech warmup is off during tests (the main config enables it to pre-download the ~700 MB Parakeet
# model at boot). Without this every @QuarkusTest boot would spawn python, bootstrap the venv, and
# start the resident worker — slow, noisy, and irrelevant to non-speech tests. The speech tests don't
# need it (SpeechControllerTest is validation-only; the domain TranscriptionServiceTest mocks the
# worker); a test that genuinely needs warmup can re-enable it with a @TestProfile override.
qits.speech.warmup-on-start=false
