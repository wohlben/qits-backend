# Order story classes so every @UserflowPrecondition runs before its dependents (topological sort;
# see UserflowClassOrderer). Dependent userflows rely on a single sequential test JVM — do not enable
# parallel execution, and keep surefire at its default reuseForks=true / forkCount=1.
junit.jupiter.testclass.order.default=eu.wohlben.qits.userflows.UserflowClassOrderer
