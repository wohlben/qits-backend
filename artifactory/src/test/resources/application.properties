# Artifactory's own test suite: in-memory H2 on the named `artifactory` datasource, no docker, no
# variant flag. Overrides the file-H2 default shipped in META-INF/microprofile-config.properties.
quarkus.datasource.artifactory.db-kind=h2
quarkus.datasource.artifactory.jdbc.url=jdbc:h2:mem:artifactory;DB_CLOSE_DELAY=-1

quarkus.flyway.artifactory.migrate-at-start=true
quarkus.flyway.artifactory.clean-at-start=true
quarkus.flyway.artifactory.locations=classpath:db/artifactory/migration

# Blob bytes under target/ (the test base class wipes this + the tables before each test).
qits.artifactory.blobs-dir=target/artifactory-test-blobs
