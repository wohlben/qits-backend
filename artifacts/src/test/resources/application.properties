# Artifacts's own test suite: in-memory H2 on the named `artifacts` datasource, no docker, no
# variant flag. Overrides the file-H2 default shipped in META-INF/microprofile-config.properties.
quarkus.datasource.artifacts.db-kind=h2
quarkus.datasource.artifacts.jdbc.url=jdbc:h2:mem:artifacts;DB_CLOSE_DELAY=-1

quarkus.flyway.artifacts.migrate-at-start=true
quarkus.flyway.artifacts.clean-at-start=true
quarkus.flyway.artifacts.locations=classpath:db/artifacts/migration

# Blob bytes under target/ (the test base class wipes this + the tables before each test).
qits.artifacts.blobs-dir=target/artifacts-test-blobs
