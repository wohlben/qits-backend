# Artifacts config defaults, shipped from this library jar (docs/epics/qits-artifacts/). Library
# jars ship defaults as META-INF/microprofile-config.properties (ordinal 100) — a jar's
# application.properties is ignored — read by whichever app pulls the jar in (the `auth/*` modules
# ship their config the same way). The consuming app / env overrides any of these.
#
# Artifacts owns its OWN named datasource + persistence unit + Flyway lineage: a separate
# file-based H2 under ~/.qits/data/artifacts, never sharing qits' default DB or its migration
# history, so the future split into a standalone service moves files, not data. Tests override the
# url to in-memory H2 (see src/test/resources/application.properties in this and the service module).
quarkus.datasource.artifacts.db-kind=h2
quarkus.datasource.artifacts.jdbc.url=jdbc:h2:file:${user.home}/.qits/data/artifacts/h2/artifacts;AUTO_SERVER=TRUE

# A dedicated persistence unit bound to the artifacts datasource, owning only this module's
# entities (the default PU keeps qits' domain entities). packages assigns entity→PU unambiguously.
quarkus.hibernate-orm.artifacts.datasource=artifacts
quarkus.hibernate-orm.artifacts.packages=eu.wohlben.qits.artifacts.entity

# Own Flyway lineage at a distinct classpath location so it never mixes with domain's db/migration.
quarkus.flyway.artifacts.migrate-at-start=true
quarkus.flyway.artifacts.baseline-on-migrate=true
quarkus.flyway.artifacts.locations=classpath:db/artifacts/migration

# Blob content lives on disk (content-addressed, fan-out dirs), decoupled from the metadata rows.
# Relative default matches the qits.repositories.data-dir convention; the app pins it to ~/.qits.
qits.artifacts.blobs-dir=${user.home}/.qits/data/artifacts/blobs

# Static write token for this system API (see docs). Blank ⇒ the write guard in `service` is a no-op
# (dev/test convenience); set to a real secret via env in a deployment. Reads are always open.
qits.artifacts.token=

# Self-seed the two default CI repository types (ci-screenshots, ci-videos) at startup. The gate
# lives in `service` (fires only when the web app boots, NORMAL/dev launch modes, never tests).
qits.artifacts.startup-seed.enabled=true
