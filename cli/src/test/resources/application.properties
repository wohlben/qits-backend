# CLI tests run against in-memory H2, so the suite needs no Docker/Testcontainers.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:qits;DB_CLOSE_DELAY=-1
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=true

# The per-workspace file watcher stays off in tests (seeding is standalone host-side data setup and
# never provisions a container; this just guarantees no inotifywait process is ever spawned here).
qits.workspace.watch.enabled=false
