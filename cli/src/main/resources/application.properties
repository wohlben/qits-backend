# The CLI shares the service's H2 file (fixed home-dir location, AUTO_SERVER) so data seeded here
# shows up in the running app. Tests override this with an in-memory H2.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:${user.home}/.qits/data/h2/qits;AUTO_SERVER=TRUE
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
qits.repositories.data-dir=${user.home}/.qits/data/repositories

# Domain beans live in a dependency jar — index it so Arc discovers them.
quarkus.index-dependency.domain.group-id=eu.wohlben
quarkus.index-dependency.domain.artifact-id=domain

# Workspace containers (see service/application.properties for the full note). The cli shares the
# domain services, so seeding worktrees also creates containers and clones from the /git server —
# which runs in the service app, so the service must be up (and docker available) when seeding.
qits.workspace.image=qits/workspace:latest
qits.workspace.container-runtime=docker
# `auto` detects a container-reachable host per environment (see GitHostResolver); override with an
# explicit IP/hostname only if auto picks the wrong interface.
qits.workspace.git-host=auto
qits.workspace.qits-port=8080
qits.workspace.term-grace-ms=5000
# Shared coding-agent credential volume (see the service application.properties for the full note).
# The cli needs it too: `seed` creates worktree containers, which mount this volume.
qits.workspace.claude-volume=qits_shared_dot_claude
qits.workspace.claude-mount=/claude-home
