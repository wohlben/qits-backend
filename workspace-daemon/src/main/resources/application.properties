# workspace-daemon — the in-container client daemon (docs/epics/qits-workspace-daemon/).
# A command-mode app with NO web stack and NO datasource: it dials home over a WebSocket and runs
# qits' in-container work. All identity/reachability is injected as container env by
# WorkspaceContainerFactory (QITS_WORKSPACE_DAEMON_* -> qits.workspace-daemon.*), so this file only carries defaults
# and logging.

# The dial-home URL (ws://<qitsHost>:<port>/api/workspace-daemon/<workspaceId>) and identity are supplied by
# the factory as env at container creation. Left unset here on purpose: a workspace-daemon that boots without
# them logs and stays idle (the container must not die for want of a socket).
# qits.workspace-daemon.url=
# qits.workspace-daemon.workspace-id=
# qits.workspace-daemon.repository-id=
# qits.workspace-daemon.branch=
# qits.workspace-daemon.parent=
# project-scoped name the daemon self-clones under (/git/<projectId>/<repoName>) so relative
# submodule urls resolve natively; blank ⇒ id-addressed clone (/git/<repositoryId>).
# qits.workspace-daemon.project-id=
# qits.workspace-daemon.repo-name=

# Liveness ping cadence and the reconnect backoff ceiling.
qits.workspace-daemon.heartbeat-interval-ms=20000
qits.workspace-daemon.reconnect-max-backoff-ms=30000

# Name the compiled artifact `qits-workspace-daemon` (not workspace-daemon-<version>-runner): drop the -runner suffix
# and set the base name, so `-Dnative` produces target/qits-workspace-daemon directly — a qits-namespaced
# process name that's identifiable in `ps`/`docker top` as PID 1's child in every workspace container.
quarkus.package.output-name=qits-workspace-daemon
quarkus.package.jar.add-runner-suffix=false

# Keep the native image lean and quiet; logs also stream home as DaemonLog once connected.
quarkus.log.level=INFO
quarkus.banner.enabled=false
