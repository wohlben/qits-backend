# The qits dev stack: one service (qits itself) on the shared qits-net, plus the workspace containers
# qits creates as siblings via the mounted docker socket — all reachable by DNS name, none binding a
# host port. Bring it up with `devcontainer up` / VS Code "Reopen in Container", then run
# `./mvnw -pl service -am quarkus:dev -Dquarkus.bootstrap.workspace-discovery=true` (or the cli
# `seed`/`seed-webapp`) in its terminal.
#
# Pin the Compose project name explicitly. Without this, the effective project name (and therefore
# the name Compose gives non-external volumes like devcontainer-dotfiles below) depends on HOW the
# stack is invoked: VS Code's Dev Containers extension / the devcontainer CLI derive one name, a
# manual `docker compose -f .devcontainer/docker-compose.yml up` from elsewhere derives another. That
# mismatch silently creates a fresh, empty devcontainer-dotfiles volume under the new name — which is
# exactly why bash history looked like it wasn't persisting. Pinning it keeps every invocation path
# pointed at the same volumes.
name: qits_devcontainer

services:
  qits:
    build:
      context: .
      dockerfile: Dockerfile
    image: qits/devcontainer:latest
    command: sleep infinity
    working_dir: /workspace
    volumes:
      # The repo, live-reloaded by quarkus:dev + Quinoa (WSL-native FS, so inotify works).
      - ..:/workspace:cached
      # docker-outside-of-docker: qits shells `docker` against the HOST daemon to run workspaces.
      - /var/run/docker.sock:/var/run/docker.sock
      # qits' H2 datastore + cloned repositories, persisted across rebuilds and shared with the cli.
      - qits-data:/home/dev/.qits
      # Shared coding-agent (Claude Code) login — the SAME volume qits' workspace containers mount at
      # /claude-home (qits.workspace.claude-volume). One OAuth login (docker/workspace/agent-login.sh,
      # run as your host uid) is then shared across the devcontainer and every workspace container.
      # `dev`'s uid matches the workspace containers', so the credential files stay mutually readable.
      - qits_shared_dot_claude:/claude-home
      # SHARED Maven + pnpm caches — the SAME named volumes qits mounts into every workspace container
      # (at the same /caches paths), so a dependency downloaded by a fixture build, an action, the
      # agent, or the devcontainer's own build is reused by all. Not the host ~/.m2 / pnpm store;
      # survives rebuilds. Tools are pointed at them via MAVEN_OPTS / npm_config_store_dir below.
      - qits_shared_m2:/caches/m2
      - qits_shared_pnpm:/caches/pnpm
      # Devcontainer user dotfiles (bash history, etc.) — persists across rebuilds independently of
      # application data (qits-data) and shared build caches.
      - devcontainer-dotfiles:/home/dev/.dotfiles
    environment:
      # On qits-net a container reaches qits by this alias — pin it so container->qits (git clone/push,
      # OTLP, MCP) is plain DNS, no eth0/host.docker.internal. Matches the `qits` alias below.
      # Quarkus maps this env var to the `qits.workspace.git-host` config property.
      QITS_WORKSPACE_GIT_HOST: qits
      # Bind Quarkus on ALL interfaces. `quarkus:dev` binds the HTTP port to `localhost` by default,
      # which is fine when qits runs on the host but fatal here: qits now runs *inside* a container on
      # qits-net, so a loopback bind makes qits:8080 unreachable from the sibling workspace containers
      # — container->qits OTLP (the daemon's dev server forwarding browser + backend spans), git, and
      # MCP all fail (browser sees 502 from the app's /api/otel proxy). It also lets the published
      # 127.0.0.1:8080 below actually reach the process. (Prod/`package` runs already bind 0.0.0.0.)
      QUARKUS_HTTP_HOST: 0.0.0.0
      # Point the in-devcontainer `claude` at the shared login dir regardless of HOME — mirrors the
      # CLAUDE_CONFIG_DIR the workspace containers set (qits.workspace.claude-mount + /.claude).
      CLAUDE_CONFIG_DIR: /claude-home/.claude
      # Point Maven + pnpm at the shared cache volumes above — the SAME knobs qits sets on every
      # workspace container (WorkspaceContainerFactory). Without the pnpm one, pnpm's "store on the
      # project's drive" heuristic would put the store at /workspace/.pnpm-store (the bind-mounted
      # repo). Cross-FS from node_modules, so pnpm copies instead of hardlinks — correct, just less
      # space-efficient.
      # Persist shell history across devcontainer rebuilds on a dedicated volume (not qits-data,
      # which is application state). Without this, HISTFILE defaults to ~/.bash_history on the
      # ephemeral container layer and is lost on every rebuild.
      HISTFILE: /home/dev/.dotfiles/.bash_history
      MAVEN_OPTS: -Dmaven.repo.local=/caches/m2
      npm_config_store_dir: /caches/pnpm/store
      # The HOST's timezone, so wall-clock output in the devcontainer (logs, `date`, commit
      # timestamps) matches the machine you're sitting at. Interpolated from .devcontainer/.env
      # (gitignored), which the devcontainer's initializeCommand writes on the host before this
      # stack comes up. qits passes its own zone on to every workspace container it creates
      # (WorkspaceContainerFactory sets TZ, config qits.workspace.timezone), so host, devcontainer
      # and workspace containers all agree. The kernel clock is shared with the host anyway; TZ is
      # the only part that needs plumbing.
      TZ: ${TZ:-Etc/UTC}
    ports:
      # App ingress for the developer's browser (the ONLY host publish — this is qits' own UI, not a
      # workspace container). Quinoa dev server on 4200 proxies /api + /daemon to Quarkus on 8080.
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:4200:4200"
    networks:
      qits-net:
        aliases:
          - qits

networks:
  # The shared network workspace containers also join (DockerExecutor attaches them and creates it if
  # absent). `external` because qits-net is owned outside compose — the devcontainer's
  # initializeCommand creates it on the host before this stack comes up, and DockerExecutor's
  # ensure-if-absent also creates it when qits runs outside the devcontainer. That avoids the
  # "network exists but was not created by compose" clash when a prior run already made it.
  qits-net:
    name: qits-net
    external: true

volumes:
  # Project-private: devcontainer user state (bash history, etc.).
  devcontainer-dotfiles:
  # Project-private: qits' H2 + repositories.
  qits-data:
  # Shared, owned outside compose (created by the devcontainer's initializeCommand, and — for the
  # claude volume — by the qits app / agent-login.sh). External so they persist and are shared with
  # the workspace containers (claude) / across rebuilds (m2, pnpm).
  qits_shared_dot_claude:
    external: true
  qits_shared_m2:
    external: true
  qits_shared_pnpm:
    external: true
